services:
  # Backend API - FastAPI + CP-SAT solver
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=info
      - BACKEND_DATA_DIR=/app/data
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    # Read-only root filesystem with a writable tmpfs for /tmp — the
    # app only persists inside ./data, so anything else getting written
    # is a bug we'd rather surface immediately.
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      # Deep health: verifies data dir writable + CP-SAT solver imports.
      test: ["CMD", "python", "-c", "import urllib.request,sys,json; r=urllib.request.urlopen('http://localhost:8000/health/deep', timeout=5); sys.exit(0 if json.load(r).get('status')=='healthy' else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

  # Frontend - React app served by nginx (non-root, listens on 8080; we
  # remap to host port 80 so the user still visits http://localhost).
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=/api
    ports:
      - "80:8080"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      # nginx writes its pid + client body temp files here.
      - /tmp
      - /var/cache/nginx
      - /var/run
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 32M
