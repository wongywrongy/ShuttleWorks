server {
    # nginx-unprivileged runs as a non-root user, which can't bind to ports
    # below 1024 — so we listen on 8080 and let docker compose remap the host
    # side (default 8081) back to it.
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression (VitePress ships uncompressed HTML/JS/CSS/SVG).
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1000;

    # VitePress hashed assets (JS/CSS chunks) are content-addressed and
    # immutable — cache them aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # cleanUrls is ON in config.mts, so links omit the .html extension. Resolve
    # an exact file first, then the reverse-clean-url .html, then a directory,
    # and finally fall back to VitePress's own generated 404 page.
    location / {
        try_files $uri $uri.html $uri/ =404;
        error_page 404 /404.html;
        # A directory without an index raises 403 in this setup — also 404 it.
        error_page 403 /404.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
