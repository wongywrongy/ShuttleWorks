server {
    # nginx-unprivileged runs as a non-root user, which can't bind to
    # ports below 1024 — so we listen on 8080 and let docker compose
    # remap the host side back to 80.
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # Unbuffered proxy for the SSE streaming endpoint — events must reach the
    # browser the instant the backend emits them. nginx's default response
    # buffering otherwise coalesces chunks and the solver HUD appears frozen
    # for several seconds at a time. Must come before the generic /api/ block.
    location = /api/schedule/stream {
        proxy_pass http://backend:8000/schedule/stream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        chunked_transfer_encoding on;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;  # 5 min for large schedules
        proxy_connect_timeout 10s;
    }

    # Hashed assets — immutable, cache aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html (and any non-hashed HTML) must NEVER be cached, otherwise the
    # browser serves a stale HTML whose <script src="/assets/index-OLD.js">
    # points to a bundle that no longer exists after a rebuild. Force-revalidate
    # on every request so new bundles land immediately.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # SPA fallback — any unmatched path returns index.html (SPA routing).
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
