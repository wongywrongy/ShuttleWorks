# Dev override — applied via `make dev`:
#
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Mounts the source tree into both containers, swaps to a `uvicorn
# --reload` CMD on the backend, and runs the Vite dev server in the
# frontend container so HMR updates the browser when you edit a .tsx
# file. The base compose file's port mappings and project name are
# inherited unchanged.

services:
  backend:
    command:
      - uvicorn
      - backend.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
      - --reload-dir
      - /app/backend
      - --reload-dir
      - /app/tournament
      - --reload-dir
      - /app/scheduler_core
    volumes:
      - ./backend:/app/backend
      - ./tournament:/app/tournament
      # Shared engine lives at the repo root; reach up two levels.
      - ../../scheduler_core:/app/scheduler_core

  frontend:
    build:
      # Repo root context so Dockerfile.dev can install the workspace.
      context: ../..
      dockerfile: products/tournament/frontend/Dockerfile.dev
    environment:
      # The Vite dev server's proxy talks to the backend container by
      # its docker network name when the frontend is inside compose.
      VITE_PROXY_TARGET: http://backend:8000
    ports:
      - "${FRONTEND_HOST_PORT:-5174}:5173"
    volumes:
      # Mount the frontend source at its workspace path so edits on the
      # host trigger Vite HMR inside the container.
      - ./frontend:/app/products/tournament/frontend
      # Mask the host's node_modules — the container ran `npm ci` and
      # owns its own node_modules / symlinks to packages/design-system.
      - /app/products/tournament/frontend/node_modules
    command:
      - npm
      - run
      - dev
      - --
      - --host
      - 0.0.0.0
      - --port
      - "5173"
