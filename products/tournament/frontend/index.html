<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tournament Prototype</title>
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script>
      // Apply persisted theme before paint to avoid flash of wrong substrate.
      // Matches the `.dark` class flow in @scheduler/design-system/tokens.css.
      (function () {
        try {
          var saved = localStorage.getItem("tournament-theme");
          var prefersDark = window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches;
          var dark = saved === "dark" || (saved !== "light" && prefersDark);
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {
          // Storage access can throw in private mode; ignore.
        }
      })();
    </script>
  </head>
  <body class="bg-bg text-ink font-sans">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
