# Production compose file — pulls pre-built images from GHCR instead of
# building locally. Users with pre-built images ready (after the first
# ``docker compose -f docker-compose.release.yml pull``) can start the
# app in seconds on any machine that has Docker installed.
#
# The ``OWNER`` env var lets a fork publish to a different GHCR namespace
# without editing this file. Defaults to ``misogyu`` (the upstream repo).
services:
  backend:
    image: ghcr.io/${OWNER:-misogyu}/scheduler-backend:${TAG:-latest}
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=info
      - BACKEND_DATA_DIR=/app/data
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys,json; r=urllib.request.urlopen('http://localhost:8000/health/deep', timeout=5); sys.exit(0 if json.load(r).get('status')=='healthy' else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G

  frontend:
    image: ghcr.io/${OWNER:-misogyu}/scheduler-frontend:${TAG:-latest}
    ports:
      - "80:8080"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
