name: ${COMPOSE_PROJECT_NAME:-btp}

services:
  # Backend API - FastAPI + CP-SAT solver
  backend:
    build:
      # Context = repo root so the Dockerfile can COPY the shared
      # scheduler_core/ tree at the top level.
      context: ../..
      dockerfile: products/scheduler/backend/Dockerfile
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    # Optional: pass-through env file. Copy backend/.env.example to
    # backend/.env and fill in SUPABASE_URL / SUPABASE_ANON_KEY /
    # ENVIRONMENT=cloud to flip the stack from local-only (default)
    # into cloud-mirroring mode. ``required: false`` so the stack
    # still boots when the file is absent — the defaults in the
    # ``environment:`` block below cover the local-only case. Values
    # in ``.env`` override the inline defaults if present.
    env_file:
      - path: backend/.env
        required: false
    environment:
      - LOG_LEVEL=info
      - DATA_DIR=/app/data
      # SQLite file lives inside the writable volume mount. Step 3 made
      # the URL explicit so the read-only root filesystem doesn't trip
      # the default ``./local.db`` path.
      - DATABASE_URL=sqlite:////app/data/local.db
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    # Read-only root filesystem with a writable tmpfs for /tmp — the
    # app only persists inside ./data, so anything else getting written
    # is a bug we'd rather surface immediately.
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      # Deep health: verifies data dir writable + CP-SAT solver imports.
      test: ["CMD", "python", "-c", "import urllib.request,sys,json; r=urllib.request.urlopen('http://localhost:8000/health/deep', timeout=5); sys.exit(0 if json.load(r).get('status')=='healthy' else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

  # Frontend - React app served by nginx (non-root, listens on 8080; we
  # remap to host port 80 so the user still visits http://localhost).
  frontend:
    build:
      # Context = repo root (matches backend) so the Dockerfile can copy
      # workspace root metadata + the shared packages/design-system tree.
      # Phase 2a consolidated to a root-only lockfile; building from the
      # frontend dir alone can't run `npm ci` without it.
      context: ../..
      dockerfile: products/scheduler/frontend/Dockerfile
      args:
        - VITE_API_BASE_URL=/api
    ports:
      - "${FRONTEND_HOST_PORT:-80}:8080"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      # nginx writes its pid + client body temp files here.
      - /tmp
      - /var/cache/nginx
      - /var/run
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 32M

  # Docs - the VitePress documentation site, built to static HTML and served by
  # nginx (non-root, listens on 8080). Brought up with the stack so
  # `make scheduler` also publishes the docs at http://localhost:8081. It is a
  # self-contained static site: no API, no depends_on — hence host port 8081,
  # clear of the app (:80) and the codanna MCP server (:8080).
  docs:
    build:
      # Context = repo root (matches the other services) so the Dockerfile can
      # copy the root lockfile + the docs/ tree and resolve the workspace graph.
      context: ../..
      dockerfile: docs/Dockerfile
    ports:
      - "${DOCS_HOST_PORT:-8081}:8080"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 32M
